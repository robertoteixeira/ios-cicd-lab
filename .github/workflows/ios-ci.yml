name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -project CICDLabApp/CICDLabApp.xcodeproj \
            -scheme CICDLabApp \
            -destination 'generic/platform=iOS Simulator'