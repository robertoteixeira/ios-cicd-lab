name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and test
        run: |
          xcodebuild test \
            -project CICDLabApp/CICDLabApp.xcodeproj \
            -scheme CICDLabApp \
            -destination 'platform=iOS Simulator,name=iPhone 16'