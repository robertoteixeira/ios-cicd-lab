name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Ruby dependencies
        run: bundle install

      - name: Build with Fastlane
        run: bundle exec fastlane ios build

      - name: Test
        run: bundle exec fastlane ios test        