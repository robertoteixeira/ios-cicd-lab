name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build with Fastlane
        run: bundle exec fastlane ios build

      - name: Upload DerivedData Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs

      - name: Test
        run: bundle exec fastlane ios test        